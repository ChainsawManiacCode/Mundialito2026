<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Mundial FC26</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial FC26">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    /* === Liquid Glass tokens, retematizados en azul Apple en vez del naranja GlassKit === */
    --gl-primary:#0a84ff;
    --gl-primary-mid:#0070e0;
    --gl-primary-dark:#0058b3;

    --gl-bg-dark:#000000;
    --gl-bg-mid:#0a0a0c;
    --gl-bg-light:#121214;

    --gl-text:#f5f7fb;
    --gl-text-muted:rgba(245,247,251,0.62);
    --gl-text-heading:#ffffff;
    --gl-text-on-light:#0b3a66;

    --gl-success:#34c759;
    --gl-error:#ff3b30;

    /* Glass surfaces — escala ascendente de translucidez */
    --gl-surface-1:rgba(255,255,255,0.07);
    --gl-surface-2:rgba(255,255,255,0.10);
    --gl-surface-3:rgba(255,255,255,0.14);
    --gl-surface-4:rgba(255,255,255,0.17);
    --gl-surface-5:rgba(255,255,255,0.23);
    --gl-surface-milk:rgba(255,255,255,0.55);
    --gl-surface-milk-strong:rgba(255,255,255,0.78);
    --gl-surface-overlay:rgba(4,9,18,0.55);

    --gl-card-glow-top:rgba(255,255,255,0.30);
    --gl-card-glow-mid:rgba(255,255,255,0.18);
    --gl-card-glow-low:rgba(255,255,255,0.11);
    --gl-card-glow-bottom:rgba(255,255,255,0.05);

    --gl-border-subtle:rgba(255,255,255,0.16);
    --gl-border-medium:rgba(255,255,255,0.26);
    --gl-border-strong:rgba(255,255,255,0.38);
    --gl-border-milk:rgba(255,255,255,0.55);
    --gl-border-focus:rgba(10,132,255,0.65);

    --gl-blur:24px;
    --gl-blur-light:16px;
    --gl-blur-soft:12px;
    --gl-blur-heavy:40px;

    --gl-radius-card:22px;
    --gl-radius-btn:16px;
    --gl-radius-input:14px;
    --gl-radius-sm:12px;
    --gl-radius-xs:8px;
    --gl-radius-full:9999px;
    --gl-radius-pill:50%;

    --gl-shadow-card:0 8px 32px rgba(0,0,0,0.32);
    --gl-shadow-btn-primary:0 6px 22px rgba(10,132,255,0.4), 0 2px 8px rgba(0,0,0,0.22);
    --gl-shadow-modal:0 24px 80px rgba(0,0,0,0.55), 0 8px 32px rgba(0,0,0,0.30);
    --gl-shadow-toast:0 8px 32px rgba(0,0,0,0.4);
    --gl-shadow-focus:0 0 0 3px rgba(10,132,255,0.35);

    --gl-inset-subtle:inset 0 1px 1px rgba(255,255,255,0.10);
    --gl-inset-medium:inset 0 1px 1px rgba(255,255,255,0.16);
    --gl-inset-strong:inset 0 1px 2px rgba(255,255,255,0.26);
    --gl-inset-milk:inset 0 1px 2px rgba(255,255,255,0.42);

    /* Aurora: teal + azul, sustituyendo el teal+naranja original por teal+azul Apple */
    --gl-aurora-1:rgba(60,60,67,0.18);
    --gl-aurora-2:rgba(10,132,255,0.03);
    --gl-aurora-3:rgba(60,60,67,0.14);
    --gl-streak-1:rgba(28,28,30,0.35);
    --gl-streak-2:rgba(10,132,255,0.02);
    --gl-glow-accent:rgba(10,132,255,0.10);

    /* Mapeo a los nombres de variable que ya consumen las reglas existentes */
    --bg:transparent;
    --bg-soft:transparent;
    --surface:var(--gl-surface-2);
    --surface-2:var(--gl-surface-3);
    --border:var(--gl-border-subtle);
    --border-strong:var(--gl-border-medium);
    --text:var(--gl-text);
    --text-dim:rgba(245,247,251,0.82);
    --text-faint:var(--gl-text-muted);
    --gold:var(--gl-primary);
    --gold-soft:var(--gl-primary);
    --green:var(--gl-success);
    --green-soft:rgba(52,199,89,0.18);
    --blue:var(--gl-primary);
    --red:var(--gl-error);

    --radius-lg:var(--gl-radius-card);
    --radius-md:18px;
    --radius-sm:var(--gl-radius-sm);
    --radius-pill:var(--gl-radius-full);
    --space-1:4px;
    --space-2:8px;
    --space-3:12px;
    --space-4:16px;
    --space-6:24px;
    --space-8:32px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ min-height:100%; background:var(--gl-bg-dark); }

  /* === AURORA BACKGROUND — capa obligatoria detrás de todo vidrio === */
  body{
    position:relative;
    min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(ellipse at 18% 18%, var(--gl-aurora-1) 0%, transparent 55%),
      radial-gradient(ellipse at 82% 30%, var(--gl-aurora-2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 75%, var(--gl-aurora-3) 0%, transparent 55%),
      linear-gradient(170deg, var(--gl-bg-light) 0%, var(--gl-bg-mid) 55%, var(--gl-bg-dark) 100%);
    color:var(--gl-text);
    font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:var(--space-8);
  }
  body::before{
    content:"";
    position:fixed;
    top:14%; left:-30%;
    width:160%; height:50%;
    background:
      radial-gradient(ellipse at 35% 45%, var(--gl-streak-1) 0%, transparent 50%),
      radial-gradient(ellipse at 65% 55%, var(--gl-streak-2) 0%, transparent 45%);
    transform:rotate(-8deg);
    pointer-events:none;
    z-index:0;
  }
  body > *{ position:relative; z-index:1; }

  /* TOPBAR DE VIDRIO — hero + tabs comparten un único contenedor fixed.
     El contenido (main) scrollea por debajo y se ve refractado a través
     del blur, que es el punto del material Liquid Glass. */
  .tabs-wrap{
    position:fixed;
    top:0; left:0; right:0;
    z-index:20;
    margin-top:calc(env(safe-area-inset-top, 0px) * -1);
    padding-top:env(safe-area-inset-top, 0px);
    background:var(--gl-surface-3);
    backdrop-filter:blur(var(--gl-blur));
    -webkit-backdrop-filter:blur(var(--gl-blur));
    border-bottom:1px solid var(--gl-border-subtle);
    box-shadow:0 8px 32px rgba(0,0,0,0.22), var(--gl-inset-subtle);
  }

  /* HEADER — ya no es un bloque propio, vive dentro de .tabs-wrap */
  .hero{
    position:relative;
    padding:18px var(--space-4) var(--space-2);
    text-align:center;
    overflow:visible;
  }
  .hero::before{ content:none; }
  .hero-top{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:var(--space-2);
    margin-bottom:var(--space-8);
    position:relative;
  }
  .hero-badge{
    display:inline-flex;
    align-items:center;
    gap:var(--space-2);
    background:var(--gl-surface-4);
    backdrop-filter:blur(var(--gl-blur-light));
    -webkit-backdrop-filter:blur(var(--gl-blur-light));
    border:1px solid var(--gl-border-medium);
    color:var(--gl-text);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:var(--gl-radius-full);
    box-shadow:var(--gl-inset-subtle);
  }
  .lock-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--gl-surface-4);
    backdrop-filter:blur(var(--gl-blur-light));
    -webkit-backdrop-filter:blur(var(--gl-blur-light));
    border:1.5px solid var(--gl-border-medium);
    color:var(--gl-text);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.02em;
    padding:7px 14px;
    border-radius:var(--gl-radius-full);
    cursor:pointer;
    transition:background .2s ease, color .2s ease, border-color .2s ease, transform .1s ease;
    -webkit-tap-highlight-color:transparent;
    box-shadow:var(--gl-inset-subtle);
  }
  .lock-btn.unlocked{
    background:var(--green-soft);
    border-color:rgba(52,199,89,0.4);
    color:#5fe3a3;
  }
  .lock-btn:active{ transform:scale(0.95); }
  .lock-btn:focus-visible{
    outline:2px solid var(--gl-primary);
    outline-offset:2px;
  }

  .hero h1{
    margin:0;
    font-family:"SF Pro Display",-apple-system,system-ui,sans-serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:-0.28px;
    line-height:1.1;
    position:relative;
    color:var(--gl-text-heading);
    text-shadow:0 2px 12px rgba(0,0,0,0.35);
  }
  .hero p{
    margin:4px 0 0;
    color:var(--gl-text-muted);
    font-size:12.5px;
    position:relative;
  }
  .tabs{
    display:flex;
    gap:var(--space-6);
    max-width:560px;
    margin:0 auto;
    padding:var(--space-4) var(--space-4) var(--space-3);
    overflow-x:auto;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex:0 0 auto;
    white-space:nowrap;
    position:relative;
    padding:6px 0;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"SF Pro Text",-apple-system,system-ui,sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:-0.1px;
    background:transparent;
    color:var(--gl-text-muted);
    border:none;
    cursor:pointer;
    transition:color .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .tab.active{
    color:var(--gl-text);
    font-weight:600;
  }
  .tab:active{ opacity:0.6; }
  .tab:focus-visible{
    outline:2px solid var(--gl-primary);
    outline-offset:4px;
    border-radius:4px;
  }

  /* SUBTABS — floating glass pill dock, mecánica idéntica a glass-tab-bar-dock pero inline */
  .subtabs{
    display:flex;
    gap:2px;
    padding:4px;
    margin-bottom:var(--space-6);
    border-radius:var(--gl-radius-full);
    background:var(--gl-surface-2);
    backdrop-filter:blur(var(--gl-blur));
    -webkit-backdrop-filter:blur(var(--gl-blur));
    border:1.5px solid var(--gl-border-medium);
    box-shadow:var(--gl-shadow-card), var(--gl-inset-medium);
  }
  .subtab{
    flex:1;
    text-align:center;
    position:relative;
    padding:7px 0;
    min-height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:var(--gl-radius-full);
    font-family:"SF Pro Text",-apple-system,system-ui,sans-serif;
    font-size:12px;
    font-weight:600;
    background:transparent;
    color:var(--gl-text-muted);
    border:1px solid transparent;
    cursor:pointer;
    transition:background .2s ease, color .2s ease, box-shadow .2s ease, transform .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .subtab::before{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    right:0;
    height:44px;
    transform:translateY(-50%);
  }
  .subtab.active{
    color:#1c1c1e;
    font-weight:600;
    background:rgba(242,242,247,0.94);
    border-color:rgba(255,255,255,0.5);
    box-shadow:0 2px 8px rgba(0,0,0,0.25), var(--gl-inset-strong);
  }
  .subtab:active{ transform:scale(0.96); }
  .subtab:focus-visible{
    outline:2px solid var(--gl-primary);
    outline-offset:2px;
  }
  .fixtures-hidden{ display:none; }

  main{
    padding:0 var(--space-4);
    max-width:560px;
    margin:0 auto;
    padding-top:calc(208px + env(safe-area-inset-top, 0px)); /* alto del topbar de vidrio + notch en iOS */
    scroll-margin-top:calc(208px + env(safe-area-inset-top, 0px));
  }

  .group-panel{ display:none; padding-top:var(--space-6); }
  .group-panel.active{ display:block; animation:fadeIn .35s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  @keyframes rowIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .standings-table tbody tr{
    animation:rowIn .3s ease both;
  }

  /* SECTION TITLES */
  .section-title{
    display:flex;
    align-items:center;
    gap:var(--space-2);
    margin:0 0 var(--space-3);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--gl-text-muted);
  }
  .section-title .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--gl-text-muted);
  }

  /* STANDINGS TABLE — glass-card */
  .standings{
    background:var(--gl-surface-2);
    backdrop-filter:blur(var(--gl-blur));
    -webkit-backdrop-filter:blur(var(--gl-blur));
    border:1.5px solid var(--gl-border-medium);
    border-radius:var(--radius-lg);
    overflow:hidden;
    margin-bottom:var(--space-8);
    box-shadow:var(--gl-shadow-card), var(--gl-inset-medium);
  }
  table.standings-table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  .standings-table thead th{
    background:var(--gl-surface-3);
    color:var(--gl-text-muted);
    font-weight:600;
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:10px 6px;
    text-align:center;
    border-bottom:1px solid var(--gl-border-subtle);
  }
  .standings-table thead th:first-child{ text-align:left; padding-left:var(--space-3); }
  .standings-table td{
    padding:10px 6px;
    text-align:center;
    color:var(--gl-text);
    border-bottom:1px solid rgba(255,255,255,0.07);
  }
  .standings-table tbody tr:last-child td{ border-bottom:none; }
  .standings-table td:first-child{
    text-align:left;
    padding-left:var(--space-3);
    color:var(--gl-text);
    font-weight:600;
  }
  .standings-table td.pts{ color:var(--gl-primary); font-weight:700; }
  .rank-cell{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .rank-num{
    width:18px;
    height:18px;
    border-radius:6px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:10.5px;
    font-weight:700;
    background:var(--gl-surface-3);
    color:var(--gl-text-muted);
    flex-shrink:0;
    border:1px solid var(--gl-border-subtle);
  }
  .standings-table tbody tr.qualified .rank-num{
    background:var(--green-soft);
    color:#5fe3a3;
    border-color:rgba(52,199,89,0.4);
  }
  .player-tag{
    display:block;
    font-size:10px;
    color:var(--gl-text-muted);
    font-weight:400;
  }

  /* JORNADA CARDS */
  .jornada{
    margin-bottom:var(--space-6);
  }
  .jornada-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:var(--space-3);
    padding:0 2px;
  }
  .jornada-header h3{
    margin:0;
    font-size:15px;
    font-weight:600;
    color:var(--gl-text);
  }
  .jornada-header span{
    font-size:11px;
    color:var(--gl-text-muted);
    font-weight:500;
  }

  .match-card{
    background:var(--gl-surface-2);
    backdrop-filter:blur(var(--gl-blur));
    -webkit-backdrop-filter:blur(var(--gl-blur));
    border:1.5px solid var(--gl-border-subtle);
    border-radius:var(--radius-md);
    padding:var(--space-4);
    margin-bottom:var(--space-3);
    transition:border-color .2s ease;
    box-shadow:0 4px 16px rgba(0,0,0,0.18), var(--gl-inset-subtle);
  }
  .match-card.played{
    border-color:var(--gl-border-focus);
  }
  .match-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:var(--space-3);
  }
  .team{
    display:flex;
    align-items:center;
    gap:var(--space-3);
    min-width:0;
  }
  .team.right{ flex-direction:row-reverse; text-align:right; }
  .flag{
    width:34px;
    height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    background:var(--gl-surface-3);
    border:1.5px solid var(--gl-border-medium);
    flex-shrink:0;
    box-shadow:var(--gl-inset-subtle);
  }
  .team-info{ min-width:0; }
  .team-name{
    font-size:13.5px;
    font-weight:600;
    color:var(--gl-text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .team-player{
    font-size:11px;
    color:var(--gl-text-muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .score-box{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .score-input{
    width:34px;
    height:34px;
    text-align:center;
    font-size:15px;
    font-weight:700;
    color:var(--gl-text);
    background:var(--gl-surface-2);
    backdrop-filter:blur(var(--gl-blur-soft));
    -webkit-backdrop-filter:blur(var(--gl-blur-soft));
    border:1.5px solid var(--gl-border-medium);
    border-radius:var(--gl-radius-sm);
    -moz-appearance:textfield;
    font-family:inherit;
    box-shadow:var(--gl-inset-subtle);
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .score-input:disabled{
    color:var(--gl-text-muted);
    background:transparent;
    border-color:rgba(255,255,255,0.08);
    box-shadow:none;
  }
  .score-input:not(:disabled):focus{
    outline:none;
    border-color:var(--gl-border-focus);
    background:var(--gl-surface-3);
    box-shadow:var(--gl-shadow-focus), var(--gl-inset-medium);
  }
  .score-dash{
    font-size:13px;
    font-weight:600;
    color:var(--gl-text-muted);
  }

  .rest-card{
    display:flex;
    align-items:center;
    gap:var(--space-3);
    background:var(--gl-surface-1);
    backdrop-filter:blur(var(--gl-blur-light));
    -webkit-backdrop-filter:blur(var(--gl-blur-light));
    border:1px dashed var(--gl-border-medium);
    border-radius:var(--radius-md);
    padding:var(--space-3) var(--space-4);
    margin-bottom:var(--space-3);
  }
  .rest-icon{
    width:30px;height:30px;
    border-radius:50%;
    background:var(--gl-surface-3);
    border:1px solid var(--gl-border-subtle);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    flex-shrink:0;
  }
  .rest-text{ font-size:12.5px; color:var(--gl-text-muted); }
  .rest-text strong{ color:var(--gl-text); font-weight:600; }

  footer{
    text-align:center;
    padding:var(--space-8) var(--space-4) 0;
    color:var(--gl-text-muted);
    font-size:11px;
  }

  /* PIN MODAL — glass-modal-overlay + glass-modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:var(--gl-surface-overlay);
    backdrop-filter:blur(var(--gl-blur-soft));
    -webkit-backdrop-filter:blur(var(--gl-blur-soft));
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:var(--space-4);
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:linear-gradient(to bottom, var(--gl-card-glow-top) 0%, var(--gl-card-glow-bottom) 100%), var(--gl-surface-3);
    backdrop-filter:blur(var(--gl-blur-heavy));
    -webkit-backdrop-filter:blur(var(--gl-blur-heavy));
    border:1.5px solid var(--gl-border-medium);
    border-radius:var(--radius-lg);
    padding:var(--space-6);
    width:100%;
    max-width:340px;
    text-align:center;
    box-shadow:var(--gl-shadow-modal);
    position:relative;
    overflow:hidden;
  }
  .modal::before{
    content:"";
    position:absolute; top:0; left:10%; right:10%; height:1px;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.45) 30%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0.45) 70%, transparent 100%);
  }
  .modal h2{
    margin:0 0 6px;
    font-family:"SF Pro Display",-apple-system,system-ui,sans-serif;
    font-size:19px;
    font-weight:600;
    letter-spacing:-0.2px;
    color:var(--gl-text-heading);
  }
  .modal p{
    margin:0 0 var(--space-4);
    font-size:12.5px;
    color:var(--gl-text-muted);
  }
  .modal input[type="password"]{
    width:100%;
    height:44px;

<script>
(function(){

  // ---------- DATA: equipos y jornadas ----------
  const GROUPS = {
    A: {
      teams: [
        {id:'COL', name:'Colombia', player:'Dani', flag:'🇨🇴'},
        {id:'CAN', name:'Canadá', player:'Adrián', flag:'🇨🇦'},
        {id:'KOR', name:'Corea del Sur', player:'Maxi', flag:'🇰🇷'},
        {id:'MEX', name:'México', player:'Nell', flag:'🇲🇽'},
        {id:'CIV', name:'Costa de Marfil', player:'Bronx', flag:'🇨🇮'},
        {id:'AUT', name:'Austria', player:'Gabo', flag:'🇦🇹'},
        {id:'SUI', name:'Suiza', player:'Robert', flag:'🇨🇭'}
      ],
      jornadas: [
        {matches:[['CAN','SUI'],['KOR','AUT'],['MEX','CIV']], rest:'COL'},
        {matches:[['COL','SUI'],['CAN','CIV'],['KOR','MEX']], rest:'AUT'},
        {matches:[['COL','AUT'],['SUI','CIV'],['CAN','KOR']], rest:'MEX'},
        {matches:[['COL','CIV'],['AUT','MEX'],['SUI','KOR']], rest:'CAN'},
        {matches:[['COL','MEX'],['CIV','KOR'],['AUT','CAN']], rest:'SUI'},
        {matches:[['COL','KOR'],['MEX','CAN'],['AUT','SUI']], rest:'CIV'},
        {matches:[['COL','CAN'],['MEX','SUI'],['CIV','AUT']], rest:'KOR'}
      ]
    },
    B: {
      teams: [
        {id:'USA', name:'Estados Unidos', player:'Minibronx', flag:'🇺🇸'},
        {id:'SWE', name:'Suecia', player:'Brayham', flag:'🇸🇪'},
        {id:'ALG', name:'Argelia', player:'Joel', flag:'🇩🇿'},
        {id:'CZE', name:'República Checa', player:'Óscar', flag:'🇨🇿'},
        {id:'ECU', name:'Ecuador', player:'Nowell', flag:'🇪🇨'},
        {id:'PAR', name:'Paraguay', player:'César', flag:'🇵🇾'}
      ],
      jornadas: [
        {matches:[['USA','PAR'],['SWE','ECU'],['ALG','CZE']]},
        {matches:[['USA','ECU'],['PAR','CZE'],['SWE','ALG']]},
        {matches:[['USA','CZE'],['ECU','ALG'],['PAR','SWE']]},
        {matches:[['USA','ALG'],['CZE','SWE'],['ECU','PAR']]},
        {matches:[['USA','SWE'],['ALG','PAR'],['CZE','ECU']]}
      ]
    }
  };

  // ─── CONFIGURACIÓN (versión pública — solo lectura) ───────────────────────
  const SUPABASE_URL = 'https://aacpfvvczajnpefkjwbk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhY3BmdnZjemFqbnBlZmtqd2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTQzNDIsImV4cCI6MjA5NzM5MDM0Mn0.7Y7uOJXchnCuipt-OrtGRGAwaQhjG_WnB1O79l-B1_8';
  const API          = `${SUPABASE_URL}/rest/v1/scores`;
  const HEADERS      = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
  // ──────────────────────────────────────────────────────────────────────────

  const unlocked = false; // siempre bloqueado en versión pública
  let scores = {};
  let koResults = {}; // resultados de eliminatoria (cuartos/semis/final) — aún sin tabla en Supabase

  const toastEl = document.getElementById('toast');
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 2200);
  }

  function matchKey(group, jIdx, mIdx){
    return group + '-' + jIdx + '-' + mIdx;
  }

  // ---------- Storage: solo lectura desde Supabase ----------

  async function loadAllScores(){
    try{
      const res = await fetch(`${API}?select=match_key,home,away`, { headers: HEADERS });
      if(!res.ok) throw new Error('fetch failed');
      const rows = await res.json();
      scores = {};
      rows.forEach(r => { scores[r.match_key] = { home: r.home, away: r.away }; });
    }catch(e){}
  }

  // ---------- Render ----------
  function teamById(group, id){
    return GROUPS[group].teams.find(t => t.id === id);
  }

  function renderJornadas(group){
    const container = document.getElementById('jornadas-' + group);
    container.innerHTML = '';
    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      const jDiv = document.createElement('div');
      jDiv.className = 'jornada';

      const header = document.createElement('div');
      header.className = 'jornada-header';
      header.innerHTML = `<h3>Jornada ${jIdx+1}</h3><span>3 partidos</span>`;
      jDiv.appendChild(header);

      jornada.matches.forEach((match, mIdx) => {
        const home = teamById(group, match[0]);
        const away = teamById(group, match[1]);
        const key = matchKey(group, jIdx, mIdx);
        const existing = scores[key] || {home:'', away:''};

        const card = document.createElement('div');
        card.className = 'match-card';
        card.dataset.key = key;

        card.innerHTML = `
          <div class="match-row">
            <div class="team">
              <div class="flag">${home.flag}</div>
              <div class="team-info">
                <div class="team-name">${home.name}</div>
                <div class="team-player">${home.player}</div>
              </div>
            </div>
            <div class="score-box">
              <input type="number" class="score-input" data-side="home" data-key="${key}" min="0" max="99" value="${existing.home}" disabled placeholder="-" aria-label="Goles de ${home.name}">
              <span class="score-dash">:</span>
              <input type="number" class="score-input" data-side="away" data-key="${key}" min="0" max="99" value="${existing.away}" disabled placeholder="-" aria-label="Goles de ${away.name}">
            </div>
            <div class="team right">
              <div class="flag">${away.flag}</div>
              <div class="team-info">
                <div class="team-name">${away.name}</div>
                <div class="team-player">${away.player}</div>
              </div>
            </div>
          </div>
        `;
        jDiv.appendChild(card);
      });

      if(jornada.rest){
        const restTeam = teamById(group, jornada.rest);
        const restCard = document.createElement('div');
        restCard.className = 'rest-card';
        restCard.innerHTML = `<div class="rest-icon">😴</div><div class="rest-text">Descansa: <strong>${restTeam.name} (${restTeam.player})</strong></div>`;
        jDiv.appendChild(restCard);
      }

      container.appendChild(jDiv);
    });
  }

  function computeStandings(group){
    const table = {};
    GROUPS[group].teams.forEach(t => {
      table[t.id] = {team:t, pj:0, pts:0, gf:0, gc:0};
    });

    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      jornada.matches.forEach((match, mIdx) => {
        const key = matchKey(group, jIdx, mIdx);
        const s = scores[key];
        if(!s || s.home === '' || s.away === '' || s.home === undefined || s.away === undefined) return;
        const h = parseInt(s.home), a = parseInt(s.away);
        if(isNaN(h) || isNaN(a)) return;

        const homeId = match[0], awayId = match[1];
        table[homeId].pj++; table[awayId].pj++;
        table[homeId].gf += h; table[homeId].gc += a;
        table[awayId].gf += a; table[awayId].gc += h;

        if(h > a) table[homeId].pts += 3;
        else if(h < a) table[awayId].pts += 3;
        else { table[homeId].pts += 1; table[awayId].pts += 1; }
      });
    });

    return Object.values(table).sort((x,y) => {
      if(y.pts !== x.pts) return y.pts - x.pts;
      const gdX = x.gf - x.gc, gdY = y.gf - y.gc;
      if(gdY !== gdX) return gdY - gdX;
      return y.gf - x.gf;
    });
  }

  // Busca el resultado del enfrentamiento directo entre dos equipos del mismo grupo.
  // Devuelve el id del equipo ganador, o null si no se jugó o fue empate.
  function headToHeadWinner(group, idA, idB){
    let winner = null;
    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      jornada.matches.forEach((match, mIdx) => {
        const [homeId, awayId] = match;
        const involvesBoth = (homeId === idA && awayId === idB) || (homeId === idB && awayId === idA);
        if(!involvesBoth) return;
        const s = scores[matchKey(group, jIdx, mIdx)];
        if(!s || s.home === '' || s.away === '' || s.home === undefined || s.away === undefined) return;
        const h = parseInt(s.home), a = parseInt(s.away);
        if(isNaN(h) || isNaN(a) || h === a) return;
        winner = h > a ? homeId : awayId;
      });
    });
    return winner;
  }

  function computeScorers(){
    const all = [];
    ['A','B'].forEach(group => {
      const standings = computeStandings(group);
      standings.forEach(row => {
        all.push({ team: row.team, group, goals: row.gf, pj: row.pj });
      });
    });
    return all.sort((x,y) => {
      if(y.goals !== x.goals) return y.goals - x.goals;
      // Empate en goles: si son del mismo grupo, decide el enfrentamiento directo
      if(x.group === y.group){
        const winnerId = headToHeadWinner(x.group, x.team.id, y.team.id);
        if(winnerId === x.team.id) return -1;
        if(winnerId === y.team.id) return 1;
      }
      return x.team.name.localeCompare(y.team.name);
    });
  }

  function renderStandings(group){
    const tbody = document.querySelector('#standings-' + group + ' tbody');
    const ranked = computeStandings(group);
    tbody.innerHTML = '';
    ranked.forEach((row, idx) => {
      const tr = document.createElement('tr');
      if(idx < 4) tr.classList.add('qualified');
      tr.style.animationDelay = (idx * 45) + 'ms';
      tr.innerHTML = `
        <td><div class="rank-cell"><span class="rank-num">${idx+1}</span><div>${row.team.name}<span class="player-tag">${row.team.player}</span></div></div></td>
        <td>${row.pj}</td>
        <td class="pts">${row.pts}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  const MEDALS = ['🥇','🥈','🥉'];

  function renderScorers(){
    const container = document.getElementById('scorers-content');
    const ranked = computeScorers();
    const hasAnyGoal = ranked.some(row => row.goals > 0);

    if(!hasAnyGoal){
      container.innerHTML = `
        <h2 class="section-title"><span class="dot"></span>Bota de oro</h2>
        <div class="locked-card">
          <div class="locked-icon">⚽</div>
          <div class="locked-title">Aún no hay goles</div>
          <div class="locked-sub">Apenas empiecen a jugarse partidos, aquí aparecerán los 3 equipos con más goles del torneo.</div>
        </div>
      `;
      return;
    }

    const top3 = ranked.slice(0, 3);
    let rows = '';
    top3.forEach((row, idx) => {
      const rankCell = `<span class="scorer-medal">${MEDALS[idx]}</span>`;
      rows += `
        <tr style="animation-delay:${idx * 40}ms">
          <td><div class="rank-cell">${rankCell}<div>${row.team.name}<span class="player-tag">${row.team.player}</span><span class="group-tag">Grupo ${row.group}</span></div></div></td>
          <td>${row.pj}</td>
          <td class="scorer-goals">${row.goals}</td>
        </tr>
      `;
    });

    container.innerHTML = `
      <h2 class="section-title"><span class="dot"></span>Bota de oro</h2>
      <div class="standings">
        <table class="standings-table" id="standings-SCORERS">
          <thead>
            <tr><th>Equipo</th><th>PJ</th><th>Goles</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // ---------- Eliminatoria ----------
  function totalJornadas(group){
    return GROUPS[group].jornadas.length;
  }

  function groupJornadasPlayed(group){
    let count = 0;
    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      const allPlayed = jornada.matches.every((match, mIdx) => {
        const s = scores[matchKey(group, jIdx, mIdx)];
        return s && s.home !== '' && s.away !== '' && s.home !== undefined && s.away !== undefined;
      });
      if(allPlayed) count++;
    });
    return count;
  }

  function groupsCompleted(){
    return groupJornadasPlayed('A') >= totalJornadas('A') && groupJornadasPlayed('B') >= totalJornadas('B');
  }

  function renderKnockoutLocked(){
    const playedA = groupJornadasPlayed('A');
    const playedB = groupJornadasPlayed('B');
    const totalA = totalJornadas('A');
    const totalB = totalJornadas('B');
    const totalPlayed = playedA + playedB;
    const totalNeeded = totalA + totalB;
    let dots = '';
    for(let i=0; i<totalNeeded; i++){
      dots += `<span class="locked-dot${i < totalPlayed ? ' done' : ''}"></span>`;
    }
    return `
      <h2 class="section-title"><span class="dot"></span>Eliminatoria</h2>
      <div class="locked-card">
        <div class="locked-icon">🔒</div>
        <div class="locked-title">Aún no hay cruces</div>
        <div class="locked-sub">Faltan jornadas para cerrar la fase de grupos. Clasifican los <strong style="color:var(--text-dim)">4 mejores de cada grupo</strong> (8 equipos en total) y los cuartos se generan automáticamente al terminar.</div>
        <div class="locked-progress">${dots}</div>
      </div>
    `;
  }

  function quarterfinalSeeds(){
    const a = computeStandings('A');
    const b = computeStandings('B');
    return [
      { id:'QF-1', home:{team:a[0].team, group:'A', seed:1}, away:{team:b[3].team, group:'B', seed:4} },
      { id:'QF-2', home:{team:a[1].team, group:'A', seed:2}, away:{team:b[2].team, group:'B', seed:3} },
      { id:'QF-3', home:{team:b[0].team, group:'B', seed:1}, away:{team:a[3].team, group:'A', seed:4} },
      { id:'QF-4', home:{team:b[1].team, group:'B', seed:2}, away:{team:a[2].team, group:'A', seed:3} },
    ];
  }

  function muSideHTML(side, score, isWinner, isPending){
    const flagHTML = side.team
      ? `<div class="mu-tag flag-real">${side.team.flag}</div>`
      : `<div class="mu-tag flag-pending">?</div>`;
    const seedTag = side.seed ? `<div class="mu-tag">${side.seed}°${side.group}</div>` : flagHTML;
    const name = side.team ? side.team.name : (side.label || 'Por definir');
    const player = side.team ? side.team.player : (side.sublabel || '—');
    const sideClass = ['mu-side', isWinner ? 'winner' : '', isPending ? 'pending' : ''].filter(Boolean).join(' ');
    return `
      <div class="${sideClass}">
        <div class="mu-left">
          ${side.seed ? seedTag : flagHTML}
          <div class="mu-info">
            <div class="mu-name">${name}</div>
            <div class="mu-player">${player}</div>
          </div>
        </div>
        <div class="mu-score">${isPending ? '–' : score}</div>
      </div>
    `;
  }

  function matchupHTML(match, isFinal){
    const r = koResults[match.id] || {};
    const hasResult = r.home !== undefined && r.home !== '' && r.away !== undefined && r.away !== '';
    const h = hasResult ? parseInt(r.home) : null;
    const a = hasResult ? parseInt(r.away) : null;
    const homeWins = hasResult && h > a;
    const awayWins = hasResult && a > h;
    const cls = isFinal ? 'matchup final' : 'matchup';
    const meta = hasResult ? '' : `<div class="mu-meta"><span>Aún sin jugar</span></div>`;
    return `
      <div class="${cls}">
        ${muSideHTML(match.home, h, homeWins, !hasResult)}
        ${muSideHTML(match.away, a, awayWins, !hasResult)}
        ${meta}
      </div>
    `;
  }

  function renderKnockoutActive(){
    const quarters = quarterfinalSeeds();

    let qfHTML = '';
    quarters.forEach(m => { qfHTML += matchupHTML(m, false); });

    let sfHTML = '';
    sfHTML += matchupHTML({ id:'SF-1', home:{label:'Ganador cuartos 1'}, away:{label:'Ganador cuartos 2'} }, false);
    sfHTML += matchupHTML({ id:'SF-2', home:{label:'Ganador cuartos 3'}, away:{label:'Ganador cuartos 4'} }, false);

    const fHTML = matchupHTML({ id:'F', home:{label:'Por definir', sublabel:'Ganador semifinal 1'}, away:{label:'Por definir', sublabel:'Ganador semifinal 2'} }, true);

    document.getElementById('round-QF').innerHTML = qfHTML;
    document.getElementById('round-SF').innerHTML = sfHTML;
    document.getElementById('round-F').innerHTML = fHTML;
  }

  function renderKnockout(){
    const lockedEl = document.getElementById('ko-locked');
    const activeEl = document.getElementById('ko-active');
    if(groupsCompleted()){
      lockedEl.innerHTML = '';
      activeEl.classList.remove('fixtures-hidden');
      renderKnockoutActive();
    } else {
      activeEl.classList.add('fixtures-hidden');
      lockedEl.innerHTML = renderKnockoutLocked();
    }
  }

  function renderAll(){
    renderJornadas('A');
    renderJornadas('B');
    renderStandings('A');
    renderStandings('B');
    renderScorers();
    renderKnockout();
    applyLockState();
  }

  function applyLockState(){
    // versión pública: inputs siempre deshabilitados
    document.querySelectorAll('.score-input').forEach(input => {
      input.disabled = true;
    });
  }

  // ---------- Score input handling — DESHABILITADO en versión pública ----------
  // Los inputs siempre están disabled, no se puede editar.

  // ---------- Tabs ----------
  const tabEls = Array.from(document.querySelectorAll('.tab'));

  function activateTab(tab){
    const group = tab.dataset.group;
    tabEls.forEach(t => {
      const isActive = t === tab;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
      t.setAttribute('tabindex', isActive ? '0' : '-1');
    });
    document.querySelectorAll('.group-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + group).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  tabEls.forEach((tab, i) => {
    tab.addEventListener('click', () => activateTab(tab));
    tab.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        activateTab(tab);
        return;
      }
      let nextIdx = null;
      if(e.key === 'ArrowRight') nextIdx = (i + 1) % tabEls.length;
      if(e.key === 'ArrowLeft') nextIdx = (i - 1 + tabEls.length) % tabEls.length;
      if(nextIdx !== null){
        e.preventDefault();
        tabEls[nextIdx].focus();
        activateTab(tabEls[nextIdx]);
      }
    });
  });

  // ---------- Subtabs genéricas (Cruces: Grupo A/B · Eliminatoria: Cuartos/Semis/Final) ----------
  function setupSubtabGroup(containerEl, datasetKey, onActivate){
    const items = Array.from(containerEl.querySelectorAll('.subtab'));

    function activate(subtab){
      const value = subtab.dataset[datasetKey];
      items.forEach(t => {
        const isActive = t === subtab;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-selected', isActive ? 'true' : 'false');
        t.setAttribute('tabindex', isActive ? '0' : '-1');
      });
      onActivate(value);
    }

    items.forEach((subtab, i) => {
      subtab.addEventListener('click', () => activate(subtab));
      subtab.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          activate(subtab);
          return;
        }
        let nextIdx = null;
        if(e.key === 'ArrowRight') nextIdx = (i + 1) % items.length;
        if(e.key === 'ArrowLeft') nextIdx = (i - 1 + items.length) % items.length;
        if(nextIdx !== null){
          e.preventDefault();
          items[nextIdx].focus();
          activate(items[nextIdx]);
        }
      });
    });
  }

  // Cruces: Grupo A / Grupo B
  setupSubtabGroup(document.querySelector('#panel-FIXTURES .subtabs'), 'fgroup', (fgroup) => {
    document.getElementById('fixtures-A').classList.toggle('fixtures-hidden', fgroup !== 'A');
    document.getElementById('fixtures-B').classList.toggle('fixtures-hidden', fgroup !== 'B');
  });

  // Eliminatoria: Cuartos / Semis / Final
  setupSubtabGroup(document.querySelector('#panel-KO .subtabs'), 'round', (round) => {
    document.getElementById('round-QF').classList.toggle('fixtures-hidden', round !== 'QF');
    document.getElementById('round-SF').classList.toggle('fixtures-hidden', round !== 'SF');
    document.getElementById('round-F').classList.toggle('fixtures-hidden', round !== 'F');
  });

  // ---------- Init ----------
  async function init(){
    showToast('Cargando resultados…');
    await loadAllScores();
    renderAll();
  }

  init();

  // ---------- Notificaciones push ----------
  // Clave pública VAPID — la privada vive solo en la Edge Function de Supabase, nunca aquí.
  const VAPID_PUBLIC_KEY = 'PEGA_AQUI_TU_CLAVE_PUBLICA_VAPID';

  const notifyBtn = document.getElementById('notifyBtn');

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  function isIos() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
  }
  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  async function saveSubscription(sub) {
    const body = {
      endpoint: sub.endpoint,
      p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
      auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth'))))
    };
    await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(body)
    });
  }

  async function subscribeToPush() {
    if (VAPID_PUBLIC_KEY === 'PEGA_AQUI_TU_CLAVE_PUBLICA_VAPID') {
      showToast('Avisos: próximamente 🔔');
      return;
    }
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      showToast('Este navegador no soporta notificaciones');
      return;
    }
    if (isIos() && !isStandalone()) {
      showToast('Primero instala la app: Compartir → Añadir a pantalla de inicio');
      return;
    }
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        showToast('No se activaron los avisos');
        return;
      }
      const reg = await navigator.serviceWorker.register('./sw.js');
      await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }
      await saveSubscription(sub);
      notifyBtn.textContent = '🔔 Avisos activados';
      notifyBtn.classList.add('unlocked');
      showToast('¡Listo! Te avisaremos de los goles');
    } catch (err) {
      showToast('No se pudo activar el aviso');
    }
  }

  async function checkExistingSubscription() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.getRegistration('./sw.js');
      if (!reg) return;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        notifyBtn.textContent = '🔔 Avisos activados';
        notifyBtn.classList.add('unlocked');
      }
    } catch (err) {}
  }

  if (notifyBtn) {
    notifyBtn.addEventListener('click', subscribeToPush);
    checkExistingSubscription();
  }

})();
</script>

</body>
