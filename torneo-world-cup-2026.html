<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mundial FC26</title>
<style>
  :root{
    --bg:#0b1020;
    --bg-soft:#0f1730;
    --surface:#141d3b;
    --surface-2:#1b2748;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --text:#f1f3fb;
    --text-dim:#a9b2d6;
    --text-faint:#6e7aa3;
    --gold:#ffcb3c;
    --gold-soft:#ffe28a;
    --green:#1fae6b;
    --green-soft:rgba(31,174,107,0.16);
    --blue:#3b82f6;
    --red:#ef4444;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --space-1:4px;
    --space-2:8px;
    --space-3:12px;
    --space-4:16px;
    --space-6:24px;
    --space-8:32px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{
    background:var(--bg);
    min-height:100%;
  }
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(59,130,246,0.18), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:var(--space-8);
  }

  /* HEADER */
  .hero{
    position:relative;
    padding:var(--space-8) var(--space-4) var(--space-6);
    text-align:center;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,203,60,0.10), transparent 70%),
      var(--bg-soft);
    border-bottom:1px solid var(--border);
  }
  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 30% 80%, rgba(255,255,255,0.25), transparent);
    opacity:0.6;
    pointer-events:none;
  }
  .hero-top{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:var(--space-2);
    margin-bottom:var(--space-4);
    position:relative;
  }
  .hero-badge{
    display:inline-flex;
    align-items:center;
    gap:var(--space-2);
    background:rgba(255,203,60,0.12);
    border:1px solid rgba(255,203,60,0.35);
    color:var(--gold-soft);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:999px;
  }
  .lock-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border:1px solid var(--border-strong);
    color:var(--text-dim);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.03em;
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:background .2s ease, color .2s ease, border-color .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .lock-btn.unlocked{
    background:rgba(31,174,107,0.14);
    border-color:rgba(31,174,107,0.4);
    color:#5fe3a3;
  }
  .lock-btn:active{ transform:scale(0.97); }

  .hero h1{
    margin:0;
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.02em;
    line-height:1.15;
    position:relative;
    background:linear-gradient(180deg,#ffffff, #c9d2f0);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .hero p{
    margin:var(--space-2) 0 0;
    color:var(--text-dim);
    font-size:14px;
    position:relative;
  }

  /* TABS GRUPO */
  .tabs{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    gap:var(--space-2);
    padding:var(--space-3) var(--space-4);
    background:rgba(11,16,32,0.85);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .tab{
    flex:1;
    text-align:center;
    padding:11px 0;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-weight:700;
    letter-spacing:0.01em;
    background:var(--surface);
    color:var(--text-dim);
    border:1px solid var(--border);
    cursor:pointer;
    transition:transform .15s ease, background .2s ease, color .2s ease, border-color .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .tab.active{
    color:#11151f;
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    border-color:transparent;
    box-shadow:0 6px 16px rgba(255,203,60,0.25);
  }
  .tab:active{ transform:scale(0.97); }

  main{ padding:0 var(--space-4); max-width:560px; margin:0 auto; }

  .group-panel{ display:none; padding-top:var(--space-6); }
  .group-panel.active{ display:block; animation:fadeIn .35s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* SECTION TITLES */
  .section-title{
    display:flex;
    align-items:center;
    gap:var(--space-2);
    margin:0 0 var(--space-3);
    font-size:13px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .section-title .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 0 3px rgba(255,203,60,0.15);
  }

  /* STANDINGS TABLE */
  .standings{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    margin-bottom:var(--space-8);
  }
  table.standings-table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  .standings-table thead th{
    background:var(--surface-2);
    color:var(--text-faint);
    font-weight:700;
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:10px 6px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  .standings-table thead th:first-child{ text-align:left; padding-left:var(--space-3); }
  .standings-table td{
    padding:10px 6px;
    text-align:center;
    color:var(--text-dim);
    border-bottom:1px solid var(--border);
  }
  .standings-table tbody tr:last-child td{ border-bottom:none; }
  .standings-table td:first-child{
    text-align:left;
    padding-left:var(--space-3);
    color:var(--text);
    font-weight:600;
  }
  .standings-table td.pts{ color:var(--gold-soft); font-weight:800; }
  .rank-cell{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .rank-num{
    width:18px;
    height:18px;
    border-radius:6px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:10.5px;
    font-weight:800;
    background:var(--surface-2);
    color:var(--text-faint);
    flex-shrink:0;
  }
  .standings-table tbody tr.qualified .rank-num{
    background:var(--green-soft);
    color:#5fe3a3;
  }
  .player-tag{
    display:block;
    font-size:10px;
    color:var(--text-faint);
    font-weight:500;
  }

  /* JORNADA CARDS */
  .jornada{
    margin-bottom:var(--space-6);
  }
  .jornada-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:var(--space-3);
    padding:0 2px;
  }
  .jornada-header h3{
    margin:0;
    font-size:15px;
    font-weight:800;
    color:var(--text-dim);
  }
  .jornada-header span{
    font-size:11px;
    color:var(--text-faint);
    font-weight:600;
  }

  .match-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:var(--space-4);
    margin-bottom:var(--space-3);
    transition:border-color .2s ease;
  }
  .match-card.played{
    border-color:rgba(255,203,60,0.25);
  }
  .match-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:var(--space-3);
  }
  .team{
    display:flex;
    align-items:center;
    gap:var(--space-3);
    min-width:0;
  }
  .team.right{ flex-direction:row-reverse; text-align:right; }
  .flag{
    width:34px;
    height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    flex-shrink:0;
  }
  .team-info{ min-width:0; }
  .team-name{
    font-size:13.5px;
    font-weight:700;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .team-player{
    font-size:11px;
    color:var(--text-faint);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .score-box{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .score-input{
    width:34px;
    height:34px;
    text-align:center;
    font-size:15px;
    font-weight:800;
    color:var(--text);
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    border-radius:8px;
    -moz-appearance:textfield;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .score-input:disabled{
    color:var(--text-dim);
    background:transparent;
    border-color:var(--border);
  }
  .score-input:not(:disabled):focus{
    outline:none;
    border-color:var(--gold);
    background:var(--surface);
  }
  .score-dash{
    font-size:13px;
    font-weight:700;
    color:var(--text-faint);
  }

  .rest-card{
    display:flex;
    align-items:center;
    gap:var(--space-3);
    background:rgba(255,255,255,0.02);
    border:1px dashed var(--border-strong);
    border-radius:var(--radius-md);
    padding:var(--space-3) var(--space-4);
    margin-bottom:var(--space-3);
  }
  .rest-icon{
    width:30px;height:30px;
    border-radius:50%;
    background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    flex-shrink:0;
  }
  .rest-text{ font-size:12.5px; color:var(--text-faint); }
  .rest-text strong{ color:var(--text-faint); font-weight:700; }

  footer{
    text-align:center;
    padding:var(--space-8) var(--space-4) 0;
    color:var(--text-faint);
    font-size:11px;
  }

  /* PIN MODAL */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:var(--space-4);
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:var(--surface);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-lg);
    padding:var(--space-6);
    width:100%;
    max-width:340px;
    text-align:center;
  }
  .modal h2{
    margin:0 0 6px;
    font-size:17px;
    font-weight:800;
    color:var(--text);
  }
  .modal p{
    margin:0 0 var(--space-4);
    font-size:12.5px;
    color:var(--text-faint);
  }
  .modal input[type="password"]{
    width:100%;
    height:44px;
    text-align:center;
    font-size:18px;
    letter-spacing:0.3em;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    border-radius:var(--radius-sm);
    color:var(--text);
    margin-bottom:var(--space-3);
  }
  .modal input[type="password"]:focus{
    outline:none;
    border-color:var(--gold);
  }
  .modal-error{
    font-size:11.5px;
    color:#ff7676;
    min-height:16px;
    margin-bottom:var(--space-3);
  }
  .modal-actions{
    display:flex;
    gap:var(--space-2);
  }
  .modal-btn{
    flex:1;
    height:40px;
    border-radius:var(--radius-sm);
    font-size:13px;
    font-weight:700;
    border:1px solid var(--border-strong);
    background:var(--surface-2);
    color:var(--text-dim);
    cursor:pointer;
  }
  .modal-btn.primary{
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    color:#11151f;
    border-color:transparent;
  }
  .modal-btn:active{ transform:scale(0.97); }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    padding:10px 18px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:200;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="hero-top">
      <span class="hero-badge">⚽ FIFA World Cup 2026</span>
    </div>
    <h1>Mundial FC26</h1>
    <p>Fase de grupos · Formato todos contra todos</p>
  </div>

  <div class="tabs">
    <div class="tab active" data-group="A">Grupo A</div>
    <div class="tab" data-group="B">Grupo B</div>
  </div>

  <main>

    <!-- ===================== GRUPO A ===================== -->
    <section class="group-panel active" id="panel-A">

      <h2 class="section-title"><span class="dot"></span>Equipos</h2>
      <div class="standings">
        <table class="standings-table" id="standings-A">
          <thead>
            <tr><th>Equipo</th><th>PJ</th><th>Pts</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <h2 class="section-title"><span class="dot"></span>Calendario</h2>
      <div id="jornadas-A"></div>

    </section>

    <!-- ===================== GRUPO B ===================== -->
    <section class="group-panel" id="panel-B">

      <h2 class="section-title"><span class="dot"></span>Equipos</h2>
      <div class="standings">
        <table class="standings-table" id="standings-B">
          <thead>
            <tr><th>Equipo</th><th>PJ</th><th>Pts</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <h2 class="section-title"><span class="dot"></span>Calendario</h2>
      <div id="jornadas-B"></div>

    </section>

  </main>

  <footer>Mundial FC26 ⚽</footer>

  <div class="toast" id="toast"></div>

<script>
(function(){

  // ---------- DATA: equipos y jornadas ----------
  const GROUPS = {
    A: {
      teams: [
        {id:'COL', name:'Colombia', player:'Dani', flag:'🇨🇴'},
        {id:'CAN', name:'Canadá', player:'Adrián', flag:'🇨🇦'},
        {id:'KOR', name:'Corea del Sur', player:'Maxi', flag:'🇰🇷'},
        {id:'MEX', name:'México', player:'Nell', flag:'🇲🇽'},
        {id:'CIV', name:'Costa de Marfil', player:'Bronx', flag:'🇨🇮'},
        {id:'AUT', name:'Austria', player:'Gabo', flag:'🇦🇹'},
        {id:'SUI', name:'Suiza', player:'Robert', flag:'🇨🇭'}
      ],
      jornadas: [
        {matches:[['CAN','SUI'],['KOR','AUT'],['MEX','CIV']], rest:'COL'},
        {matches:[['COL','SUI'],['CAN','CIV'],['KOR','MEX']], rest:'AUT'},
        {matches:[['COL','AUT'],['SUI','CIV'],['CAN','KOR']], rest:'MEX'},
        {matches:[['COL','CIV'],['AUT','MEX'],['SUI','KOR']], rest:'CAN'},
        {matches:[['COL','MEX'],['CIV','KOR'],['AUT','CAN']], rest:'SUI'},
        {matches:[['COL','KOR'],['MEX','CAN'],['AUT','SUI']], rest:'CIV'},
        {matches:[['COL','CAN'],['MEX','SUI'],['CIV','AUT']], rest:'KOR'}
      ]
    },
    B: {
      teams: [
        {id:'USA', name:'Estados Unidos', player:'Minibronx', flag:'🇺🇸'},
        {id:'SWE', name:'Suecia', player:'Brayham', flag:'🇸🇪'},
        {id:'SCO', name:'Escocia', player:'Henryto', flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},
        {id:'ALG', name:'Argelia', player:'Joel', flag:'🇩🇿'},
        {id:'CZE', name:'República Checa', player:'Óscar', flag:'🇨🇿'},
        {id:'ECU', name:'Ecuador', player:'Nowell', flag:'🇪🇨'},
        {id:'PAR', name:'Paraguay', player:'César', flag:'🇵🇾'}
      ],
      jornadas: [
        {matches:[['SWE','PAR'],['SCO','ECU'],['ALG','CZE']], rest:'USA'},
        {matches:[['USA','PAR'],['SWE','CZE'],['SCO','ALG']], rest:'ECU'},
        {matches:[['USA','ECU'],['PAR','CZE'],['SWE','SCO']], rest:'ALG'},
        {matches:[['USA','CZE'],['ECU','ALG'],['PAR','SCO']], rest:'SWE'},
        {matches:[['USA','ALG'],['CZE','SCO'],['ECU','SWE']], rest:'PAR'},
        {matches:[['USA','SCO'],['ALG','SWE'],['ECU','PAR']], rest:'CZE'},
        {matches:[['USA','SWE'],['ALG','PAR'],['CZE','ECU']], rest:'SCO'}
      ]
    }
  };

  // ─── CONFIGURACIÓN (versión pública — solo lectura) ───────────────────────
  const SUPABASE_URL = 'https://aacpfvvczajnpefkjwbk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhY3BmdnZjemFqbnBlZmtqd2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTQzNDIsImV4cCI6MjA5NzM5MDM0Mn0.7Y7uOJXchnCuipt-OrtGRGAwaQhjG_WnB1O79l-B1_8';
  const API          = `${SUPABASE_URL}/rest/v1/scores`;
  const HEADERS      = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
  // ──────────────────────────────────────────────────────────────────────────

  const unlocked = false; // siempre bloqueado en versión pública
  let scores = {};

  const toastEl = document.getElementById('toast');
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 2200);
  }

  function matchKey(group, jIdx, mIdx){
    return group + '-' + jIdx + '-' + mIdx;
  }

  // ---------- Storage: solo lectura desde Supabase ----------

  async function loadAllScores(){
    try{
      const res = await fetch(`${API}?select=match_key,home,away`, { headers: HEADERS });
      if(!res.ok) throw new Error('fetch failed');
      const rows = await res.json();
      scores = {};
      rows.forEach(r => { scores[r.match_key] = { home: r.home, away: r.away }; });
    }catch(e){}
  }

  // ---------- Render ----------
  function teamById(group, id){
    return GROUPS[group].teams.find(t => t.id === id);
  }

  function renderJornadas(group){
    const container = document.getElementById('jornadas-' + group);
    container.innerHTML = '';
    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      const jDiv = document.createElement('div');
      jDiv.className = 'jornada';

      const header = document.createElement('div');
      header.className = 'jornada-header';
      header.innerHTML = `<h3>Jornada ${jIdx+1}</h3><span>3 partidos</span>`;
      jDiv.appendChild(header);

      jornada.matches.forEach((match, mIdx) => {
        const home = teamById(group, match[0]);
        const away = teamById(group, match[1]);
        const key = matchKey(group, jIdx, mIdx);
        const existing = scores[key] || {home:'', away:''};

        const card = document.createElement('div');
        card.className = 'match-card';
        card.dataset.key = key;

        card.innerHTML = `
          <div class="match-row">
            <div class="team">
              <div class="flag">${home.flag}</div>
              <div class="team-info">
                <div class="team-name">${home.name}</div>
                <div class="team-player">${home.player}</div>
              </div>
            </div>
            <div class="score-box">
              <input type="number" class="score-input" data-side="home" data-key="${key}" min="0" max="99" value="${existing.home}" disabled placeholder="-">
              <span class="score-dash">:</span>
              <input type="number" class="score-input" data-side="away" data-key="${key}" min="0" max="99" value="${existing.away}" disabled placeholder="-">
            </div>
            <div class="team right">
              <div class="flag">${away.flag}</div>
              <div class="team-info">
                <div class="team-name">${away.name}</div>
                <div class="team-player">${away.player}</div>
              </div>
            </div>
          </div>
        `;
        jDiv.appendChild(card);
      });

      const restTeam = teamById(group, jornada.rest);
      const restCard = document.createElement('div');
      restCard.className = 'rest-card';
      restCard.innerHTML = `<div class="rest-icon">😴</div><div class="rest-text">Descansa: <strong>${restTeam.name} (${restTeam.player})</strong></div>`;
      jDiv.appendChild(restCard);

      container.appendChild(jDiv);
    });
  }

  function computeStandings(group){
    const table = {};
    GROUPS[group].teams.forEach(t => {
      table[t.id] = {team:t, pj:0, pts:0, gf:0, gc:0};
    });

    GROUPS[group].jornadas.forEach((jornada, jIdx) => {
      jornada.matches.forEach((match, mIdx) => {
        const key = matchKey(group, jIdx, mIdx);
        const s = scores[key];
        if(!s || s.home === '' || s.away === '' || s.home === undefined || s.away === undefined) return;
        const h = parseInt(s.home), a = parseInt(s.away);
        if(isNaN(h) || isNaN(a)) return;

        const homeId = match[0], awayId = match[1];
        table[homeId].pj++; table[awayId].pj++;
        table[homeId].gf += h; table[homeId].gc += a;
        table[awayId].gf += a; table[awayId].gc += h;

        if(h > a) table[homeId].pts += 3;
        else if(h < a) table[awayId].pts += 3;
        else { table[homeId].pts += 1; table[awayId].pts += 1; }
      });
    });

    return Object.values(table).sort((x,y) => {
      if(y.pts !== x.pts) return y.pts - x.pts;
      const gdX = x.gf - x.gc, gdY = y.gf - y.gc;
      if(gdY !== gdX) return gdY - gdX;
      return y.gf - x.gf;
    });
  }

  function renderStandings(group){
    const tbody = document.querySelector('#standings-' + group + ' tbody');
    const ranked = computeStandings(group);
    tbody.innerHTML = '';
    ranked.forEach((row, idx) => {
      const tr = document.createElement('tr');
      if(idx < 4) tr.classList.add('qualified');
      tr.innerHTML = `
        <td><div class="rank-cell"><span class="rank-num">${idx+1}</span><div>${row.team.name}<span class="player-tag">${row.team.player}</span></div></div></td>
        <td>${row.pj}</td>
        <td class="pts">${row.pts}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderAll(){
    renderJornadas('A');
    renderJornadas('B');
    renderStandings('A');
    renderStandings('B');
    applyLockState();
  }

  function applyLockState(){
    // versión pública: inputs siempre deshabilitados
    document.querySelectorAll('.score-input').forEach(input => {
      input.disabled = true;
    });
  }

  // ---------- Score input handling — DESHABILITADO en versión pública ----------
  // Los inputs siempre están disabled, no se puede editar.

  // ---------- Tabs ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const group = tab.dataset.group;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.group-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + group).classList.add('active');
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });

  // ---------- Init ----------
  async function init(){
    showToast('Cargando resultados…');
    await loadAllScores();
    renderAll();
  }

  init();

})();
</script>
